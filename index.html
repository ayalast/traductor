<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mi Traductor ✦ Groq + DeepSeek</title>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg:#0a0c14; --surface2:#181c2e;
    --border:rgba(241,99,52,0.22); --accent:#f16334;
    --accent2:#fb923c; --gold:#e8c97a;
    --text:#eef1ff; --muted:#9ba3c7;
    --bubble-user:linear-gradient(135deg,#c2410c,#f16334);
    --bubble-ai:#181c2e;
    --bg-overlay:rgba(10,12,20,.92);
    --panel-bg:rgba(10,12,20,.98);
    --glow-1:rgba(241,99,52,.14);
    --glow-2:rgba(251,146,60,.10);
    --logo-grad-1:#c2410c;
    --logo-grad-2:#fb923c;
    --avatar-ai-1:#7c2d12;
    --avatar-ai-2:#f16334;
    --avatar-usr-1:#f16334;
    --avatar-usr-2:#fb923c;
    --title-grad-start:#eef1ff;
    --title-grad-end:#fb923c;
    --heading:#ffd9bf;
    --emphasis:#e9c87f;
    --code-bg:rgba(241,99,52,.14);
    --code-text:#ffd2aa;
    --focus-ring:rgba(241,99,52,.18);
    --send-grad-1:#c2410c;
    --send-grad-2:#f16334;
    --user-text:#ffffff;
    --logo-shadow:rgba(241,99,52,.35);
    --scroll-thumb:#2a2f4a;
    --bubble-shadow:rgba(0,0,0,.3);
    --send-shadow:rgba(241,99,52,.4);
    --send-shadow-hover:rgba(241,99,52,.55);
    --steps-bg:rgba(241,99,52,.07);
    --error-bg:rgba(220,60,60,.1);
    --error-border:rgba(220,60,60,.22);
    --error-text:#ff9e9e;
    --font-body:'DM Sans',sans-serif;
    --font-display:'Playfair Display',serif;
    --font-code:'JetBrains Mono',ui-monospace,monospace;
    --link-color:#8cc8ff;
    --link-hover:#c6e5ff;
    --paper-opacity:0;
    --paper-contrast:1;
    --paper-global-opacity:0;
    --paper-global-contrast:1;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);
    min-height:100vh;min-height:100dvh;display:flex;justify-content:center;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%,var(--glow-1) 0%,transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 90%,var(--glow-2) 0%,transparent 70%);
    pointer-events:none}
  body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    opacity:var(--paper-opacity);mix-blend-mode:soft-light;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,.34) 0 0.6px, transparent 0.7px) 0 0/3px 3px,
      radial-gradient(circle at 70% 60%, rgba(0,0,0,.24) 0 0.55px, transparent 0.7px) 1px 1px/3px 3px,
      repeating-linear-gradient(0deg, rgba(120,95,60,.03) 0 2px, rgba(255,255,255,.015) 2px 4px);
    filter:contrast(var(--paper-contrast)) saturate(.92)}
  #paper-global-overlay{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
    opacity:var(--paper-global-opacity);mix-blend-mode:soft-light;
    background:
      radial-gradient(circle at 25% 20%, rgba(255,255,255,.34) 0 0.6px, transparent 0.7px) 0 0/3px 3px,
      radial-gradient(circle at 75% 68%, rgba(0,0,0,.26) 0 0.55px, transparent 0.7px) 1px 1px/3px 3px,
      repeating-linear-gradient(0deg, rgba(120,95,60,.03) 0 2px, rgba(255,255,255,.015) 2px 4px);
    filter:contrast(var(--paper-global-contrast)) saturate(.92)}
  .app{position:relative;z-index:1;width:100%;max-width:680px;
    display:flex;flex-direction:column;
    height:100vh;height:100dvh}

  #key-panel{
    position:fixed;
    left:50%;
    transform:translateX(-50%) translateY(120%);
    bottom:calc(64px + env(safe-area-inset-bottom));
    width:min(640px,calc(100vw - 20px));
    padding:12px;
    background:var(--panel-bg);
    border:1px solid var(--border);
    border-radius:14px;
    display:block;
    z-index:21;
    opacity:0;
    pointer-events:none;
    transition:transform .25s ease,opacity .25s ease;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  #key-panel.open{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
  .settings-title{font-size:.78rem;color:var(--accent2);font-weight:600;margin-bottom:8px}
  .settings-section{margin-top:8px}
  .settings-section label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:6px}
  .settings-row{display:flex;align-items:center;gap:8px}
  #providerSelect,#apiKeyInput,#groqKeyInput,#deepseekKeyInput,#notesInput{
    flex:1;min-width:0;
    background:var(--surface2);border:1px solid var(--border);
    border-radius:10px;padding:7px 12px;color:var(--text);
    font-family:var(--font-body);font-size:.8rem;outline:none;
    transition:border-color .2s;
  }
  #providerSelect,#notesInput{width:100%}
  #notesInput{min-height:86px;max-height:180px;resize:vertical}
  #providerSelect:focus,#apiKeyInput:focus,#groqKeyInput:focus,#deepseekKeyInput:focus,#notesInput:focus{border-color:var(--accent)}
  #apiKeyInput::placeholder,#groqKeyInput::placeholder,#deepseekKeyInput::placeholder,#notesInput::placeholder{color:var(--muted)}
  .key-link{font-size:.7rem;color:var(--accent2);text-decoration:none;white-space:nowrap}
  .key-link:hover{text-decoration:underline}
  .key-status{font-size:18px;flex-shrink:0;transition:all .3s}

  header{padding:10px 14px;background:var(--bg-overlay);backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);display:flex;align-items:center;
    justify-content:space-between;gap:8px;flex-shrink:0;flex-wrap:wrap}
  .header-brand{display:flex;align-items:center;gap:10px}
  .logo-btn{border:none;background:none;padding:0;cursor:pointer;flex-shrink:0;touch-action:manipulation}
  .logo{width:38px;height:38px;border-radius:12px;
    background:linear-gradient(135deg,var(--logo-grad-1),var(--logo-grad-2));
    display:flex;align-items:center;justify-content:center;
    font-size:18px;box-shadow:0 4px 18px var(--logo-shadow)}
  .logo-btn:focus-visible .logo{outline:2px solid var(--accent2);outline-offset:2px}
  .brand-text h1{font-family:var(--font-display);font-size:1.1rem;font-weight:700;
    background:linear-gradient(90deg,var(--title-grad-start),var(--title-grad-end));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .brand-text p{font-size:.62rem;color:var(--muted);letter-spacing:.04em}
  .header-controls{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
  .select-wrap{position:relative}
  .select-wrap::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:10px;pointer-events:none}
  select{appearance:none;background:var(--surface2);color:var(--text);
    border:1px solid var(--border);border-radius:10px;padding:6px 24px 6px 9px;
    font-family:var(--font-body);font-size:.68rem;cursor:pointer;outline:none;
    transition:border-color .2s;max-width:150px;overflow:hidden;text-overflow:ellipsis}
  select:hover{border-color:var(--accent)}
  .theme-open-btn{
    appearance:none;background:var(--surface2);color:var(--text);
    border:1px solid var(--border);border-radius:10px;padding:6px 10px;
    font-family:var(--font-body);font-size:.68rem;cursor:pointer;outline:none;
    transition:border-color .2s,transform .15s;white-space:nowrap
  }
  .theme-open-btn:hover{border-color:var(--accent);transform:translateY(-1px)}

  #chat{flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:14px;
    scrollbar-width:thin;scrollbar-color:var(--scroll-thumb) transparent;-webkit-overflow-scrolling:touch}
  #chat::-webkit-scrollbar{width:3px}
  #chat::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:99px}

  .msg{display:flex;align-items:flex-end;gap:7px;animation:fadeUp .3s ease both}
  .msg.user{flex-direction:row-reverse}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .avatar{width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
  .avatar.ai{background:linear-gradient(135deg,var(--avatar-ai-1),var(--avatar-ai-2))}
  .avatar.usr{background:linear-gradient(135deg,var(--avatar-usr-1),var(--avatar-usr-2))}
  .msg-content{display:flex;flex-direction:column;gap:0;max-width:90%}
  .msg.user .msg-content{align-items:flex-end}
  .bubble{max-width:100%;padding:11px 14px;border-radius:18px;font-size:.85rem;line-height:1.6;box-shadow:0 4px 20px var(--bubble-shadow)}
  .bubble.ai{background:var(--bubble-ai);border:1px solid var(--border);border-bottom-left-radius:4px}
  .bubble.user{background:var(--bubble-user);border-bottom-right-radius:4px;color:var(--user-text)}
  .msg-actions{display:flex;gap:6px;flex-wrap:wrap;max-height:0;opacity:0;overflow:hidden;pointer-events:none;transform:translateY(-3px);margin-top:0;transition:max-height .2s ease,opacity .2s ease,transform .2s ease,margin-top .2s ease}
  .msg:hover .msg-actions,.msg:focus-within .msg-actions,.msg.actions-open .msg-actions{max-height:44px;opacity:1;pointer-events:auto;transform:translateY(0);margin-top:6px}
  .msg-action-btn{border:1px solid var(--border);background:var(--surface2);color:var(--muted);border-radius:999px;padding:3px 8px;font-size:.66rem;cursor:pointer}
  .msg-action-btn:hover{color:var(--text);border-color:var(--accent)}
  .msg.editing .bubble{outline:2px solid var(--accent);outline-offset:2px}

  .bubble.ai h1,.bubble.ai h2,.bubble.ai h3{font-family:var(--font-display);color:var(--heading);margin:12px 0 4px;font-size:.9rem}
  .bubble.ai h3:first-child{margin-top:0}
  .bubble.ai strong{color:var(--emphasis);font-weight:600}
  .bubble.ai em{color:var(--gold)}
  .bubble.ai hr{border:none;border-top:1px solid var(--border);margin:11px 0}
  .bubble.ai p{margin:4px 0}
  .bubble.ai ul,.bubble.ai ol{padding-left:16px;margin:4px 0}
  .bubble.ai li{margin:3px 0}
  .bubble.ai code{background:var(--code-bg);border:1px solid var(--border);border-radius:5px;padding:1px 5px;font-size:.79rem;font-family:var(--font-code);color:var(--code-text)}
  .bubble.ai a,.bubble.ai a:visited{color:var(--link-color);text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:2px}
  .bubble.ai a:hover{color:var(--link-hover)}

  .typing-wrap{display:flex;align-items:center;gap:5px;padding:11px 14px}
  .typing-wrap span{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.5;animation:bounce 1.1s infinite ease}
  .typing-wrap span:nth-child(2){animation-delay:.16s}
  .typing-wrap span:nth-child(3){animation-delay:.32s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-7px);opacity:1}}

  footer{padding:10px 12px 12px;background:var(--bg-overlay);backdrop-filter:blur(20px);border-top:1px solid var(--border);flex-shrink:0}
  .input-row{display:flex;gap:8px;align-items:flex-end}
  textarea{flex:1;resize:none;min-height:44px;max-height:110px;
    background:var(--surface2);border:1px solid var(--border);border-radius:14px;
    padding:11px 14px;color:var(--text);font-family:var(--font-body);
    font-size:16px;line-height:1.45;outline:none;overflow-y:auto;
    transition:border-color .2s,box-shadow .2s}
  textarea::placeholder{color:var(--muted)}
  textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--focus-ring)}
  .send-btn{width:44px;height:44px;border-radius:12px;flex-shrink:0;
    background:linear-gradient(135deg,var(--send-grad-1),var(--send-grad-2));border:none;cursor:pointer;color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:18px;
    box-shadow:0 4px 16px var(--send-shadow);transition:transform .15s,box-shadow .15s,opacity .15s;touch-action:manipulation}
  .send-btn:hover:not(:disabled){transform:scale(1.07);box-shadow:0 6px 22px var(--send-shadow-hover)}
  .send-btn:disabled{opacity:.35;cursor:not-allowed}
  .footer-meta{display:flex;justify-content:space-between;align-items:center;margin-top:7px}
  .hint{font-size:.64rem;color:var(--muted)}
  .clear-btn{background:none;border:none;color:var(--muted);font-family:var(--font-body);font-size:.67rem;cursor:pointer;padding:4px 8px;border-radius:8px;transition:color .2s,background .2s}
  .clear-btn:hover{color:var(--text);background:var(--surface2)}

  .welcome{text-align:center;padding:16px 4px;animation:fadeUp .5s ease both}
  .welcome .icon{font-size:2rem;margin-bottom:8px;display:block}
  .welcome h2{font-family:var(--font-display);font-size:1.2rem;margin-bottom:6px;background:linear-gradient(90deg,var(--title-grad-start),var(--title-grad-end));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .steps{text-align:left;display:block;width:100%;background:var(--steps-bg);border:1px solid var(--border);border-radius:14px;padding:12px 14px;font-size:.76rem;color:var(--muted)}
  .steps b{color:var(--accent2);display:block;margin-bottom:8px;font-size:.8rem}
  .steps ol{padding-left:15px}
  .steps li{margin:4px 0;line-height:1.5}

  .error-bubble{background:var(--error-bg);border:1px solid var(--error-border);color:var(--error-text);border-radius:14px;padding:11px 14px;font-size:.82rem}

  #theme-panel{
    position:fixed;inset:0;z-index:30;display:none;
    background:rgba(5,8,12,.56);backdrop-filter:blur(6px)
  }
  #theme-panel.open{display:block}
  .theme-sheet{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:min(760px,calc(100vw - 18px));max-height:min(88vh,760px);overflow:auto;
    background:var(--panel-bg);border:1px solid var(--border);border-radius:16px;
    box-shadow:0 18px 42px rgba(0,0,0,.35);padding:14px
  }
  .theme-sheet-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
  .theme-sheet-title{font-family:var(--font-display);font-size:1rem;color:var(--text)}
  .theme-close{border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:10px;padding:6px 10px;cursor:pointer}
  .theme-mode-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .mode-btn{border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:10px;padding:7px 10px;cursor:pointer;font-size:.76rem}
  .mode-btn.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--focus-ring)}
  .paper-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .paper-row label{font-size:.76rem;color:var(--text)}
  .paper-toggle{display:flex;align-items:center;gap:8px}
  .paper-toggle input{transform:scale(1.1)}
  .paper-slider{flex:1;min-width:180px;display:flex;align-items:center;gap:8px}
  .paper-slider input[type="range"]{width:100%}
  .paper-val{font-size:.74rem;color:var(--muted);min-width:42px;text-align:right}
  .theme-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
  .theme-card{border:1px solid var(--border);border-radius:12px;background:var(--surface2);padding:10px;cursor:pointer;text-align:left;color:var(--text)}
  .theme-card.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--focus-ring)}
  .theme-card-title{font-size:.84rem;font-weight:700;margin-bottom:4px}
  .theme-card-meta{font-size:.72rem;color:var(--muted);margin-bottom:8px}
  .theme-swatches{display:flex;gap:6px}
  .sw{width:16px;height:16px;border-radius:99px;border:1px solid rgba(255,255,255,.25)}

  @media (max-width:480px){
    #key-panel{bottom:calc(56px + env(safe-area-inset-bottom));padding:10px}
    #key-panel label,.key-link{display:none}
    header{padding:8px 12px;gap:6px}
    .logo{width:34px;height:34px;border-radius:10px;font-size:16px}
    .brand-text h1{font-size:1rem}
    .brand-text p{display:none}
    .header-controls{width:100%;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
    .select-wrap{min-width:0}
    select{width:100%;max-width:none;font-size:.67rem;padding:6px 22px 6px 8px}
    .theme-open-btn{width:100%;font-size:.67rem;padding:6px 8px}
    .theme-sheet{width:min(760px,calc(100vw - 12px));padding:12px;max-height:92vh}
    .paper-row{gap:8px}
    .paper-slider{min-width:100%}
    .theme-grid{grid-template-columns:1fr;gap:8px}
    #chat{padding:12px 10px;gap:12px}
    .bubble{font-size:.83rem;padding:10px 13px}
    footer{padding:8px 10px 10px}
    textarea{font-size:16px;padding:10px 13px;min-height:42px}
    .send-btn{width:42px;height:42px}
    .hint{display:none}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-brand">
      <button class="logo-btn" onclick="toggleKeyPanel()" title="Configuración" aria-label="Configuración">
        <div class="logo">🧠</div>
      </button>
      <div class="brand-text">
        <h1>Mi Traductor</h1>
        <p>GROQ + DEEPSEEK</p>
      </div>
    </div>
    <div class="header-controls">
      <div class="select-wrap">
        <select id="providerSelect">
          <option value="groq" selected>Groq</option>
          <option value="deepseek">DeepSeek</option>
        </select>
      </div>
      <div class="select-wrap">
        <select id="modelSelect">
          <option value="moonshotai/kimi-k2-instruct-0905" selected>Kimi K2 Instruct 0905 ⭐</option>
        </select>
      </div>
      <div class="select-wrap">
        <select id="tempSelect">
          <option value="0.2">Preciso</option>
          <option value="0.5" selected>Equilibrado</option>
          <option value="0.9">Creativo</option>
        </select>
      </div>
      <button class="theme-open-btn" id="openThemePanelBtn" type="button" title="Abrir configuración de temas" aria-label="Abrir configuración de temas" onclick="toggleThemePanel(true)">🎨 Temas</button>
    </div>
  </header>

  <div id="chat"></div>

  <footer>
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Escribe en inglés o español..."></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Enviar">➤</button>
    </div>
    <div class="footer-meta">
      <span class="hint">↵ Enviar · Shift+↵ Nueva línea</span>
      <button class="clear-btn" onclick="clearChat()">🗑 Limpiar</button>
    </div>
  </footer>
</div>

<div id="key-panel">
  <div class="settings-title">⚙️ Configuración</div>

  <div class="settings-section">
    <label>Proveedor activo</label>
    <div class="settings-row">
      <select id="settingsProviderSelect">
        <option value="groq" selected>Groq</option>
        <option value="deepseek">DeepSeek</option>
      </select>
    </div>
  </div>

  <div class="settings-section">
    <label>🔑 API key del proveedor activo</label>
    <div class="settings-row">
      <input type="password" id="apiKeyInput" placeholder="gsk_... o sk-..." oninput="onKeyInput()">
      <span class="key-status" id="keyStatus">⬜</span>
      <a class="key-link" id="providerKeyLink" href="https://console.groq.com/keys" target="_blank">Obtener →</a>
    </div>
  </div>

  <div class="settings-section">
    <label>🔐 Groq API Key</label>
    <div class="settings-row">
      <input type="password" id="groqKeyInput" placeholder="gsk_xxxxxxxxxxxxxxxxxxxxxxxx" oninput="onProviderKeyInput('groq')">
      <span class="key-status" id="groqKeyStatus">⬜</span>
      <a class="key-link" href="https://console.groq.com/keys" target="_blank">Groq →</a>
    </div>
  </div>

  <div class="settings-section">
    <label>🔐 DeepSeek API Key</label>
    <div class="settings-row">
      <input type="password" id="deepseekKeyInput" placeholder="sk_xxxxxxxxxxxxxxxxxxxxxxxx" oninput="onProviderKeyInput('deepseek')">
      <span class="key-status" id="deepseekKeyStatus">⬜</span>
      <a class="key-link" href="https://platform.deepseek.com/api_keys" target="_blank">DeepSeek →</a>
    </div>
  </div>

  <div class="settings-section">
    <label>📝 Notas persistentes</label>
    <div class="settings-row">
      <textarea id="notesInput" placeholder="Objetivo, región, tono o recordatorios para las respuestas." oninput="onNotesInput()"></textarea>
    </div>
  </div>
</div>

<div id="theme-panel" aria-hidden="true">
  <div class="theme-sheet" role="dialog" aria-modal="true" aria-label="Configuración de temas">
    <div class="theme-sheet-head">
      <div class="theme-sheet-title">🎨 Configuración de temas</div>
      <button class="theme-close" type="button" onclick="toggleThemePanel(false)">Cerrar</button>
    </div>

function toggleKeyPanel(force) {

function toggleThemePanel(force) {
  if (!themePanel) return;
  const open = typeof force === 'boolean' ? force : !themePanel.classList.contains('open');
  themePanel.classList.toggle('open', open);
  themePanel.setAttribute('aria-hidden', open ? 'false' : 'true');
}

function getThemeVars(themeId, mode) {
  const theme = THEMES[themeId] || THEMES[DEFAULT_THEME];
  return theme?.modes?.[mode]?.vars || theme?.modes?.[DEFAULT_THEME_MODE]?.vars || {};
}

function updateModeButtons() {
  modeDarkBtn?.classList.toggle('active', activeThemeMode === 'dark');
  modeLightBtn?.classList.toggle('active', activeThemeMode === 'light');
}

function renderThemeCards() {
  if (!themeGrid) return;
  const html = Object.entries(THEMES).map(([id, theme]) => {
    const palette = theme.modes[activeThemeMode]?.vars || theme.modes.dark.vars;
    return `<button type="button" class="theme-card ${id === activeThemeId ? 'active' : ''}" onclick="setTheme('${id}')"><div class="theme-card-title">${theme.label}</div><div class="theme-card-meta">${activeThemeMode === 'dark' ? 'Oscuro' : 'Claro'}</div><div class="theme-swatches"><span class="sw" style="background:${palette['--accent']}"></span><span class="sw" style="background:${palette['--surface2']}"></span><span class="sw" style="background:${palette['--text']}"></span></div></button>`;
  }).join('');
  themeGrid.innerHTML = html;
}

function applyTheme(themeId, mode) {
  const id = THEMES[themeId] ? themeId : DEFAULT_THEME;
  const normalizedMode = mode === 'light' || mode === 'dark' ? mode : DEFAULT_THEME_MODE;
  activeThemeId = id;
  activeThemeMode = normalizedMode;
  const vars = getThemeVars(id, normalizedMode);
  Object.entries(vars).forEach(([cssVar, value]) => document.documentElement.style.setProperty(cssVar, value));
  updateModeButtons();
  renderThemeCards();
}

function setTheme(themeId) {
  applyTheme(themeId, activeThemeMode);
  localStorage.setItem(SAVED_THEME_KEY, activeThemeId);
}

function setThemeMode(mode) {
  applyTheme(activeThemeId, mode);
  localStorage.setItem(SAVED_THEME_MODE_KEY, activeThemeMode);
}

function applyPaperTexture(enabled, level) {
  const on = !!enabled;
  const normalized = Number.isFinite(level) ? Math.max(0, Math.min(100, level)) : 0;
  const opacity = on ? (normalized / 100) * 0.28 : 0;
  const contrast = on ? 1 + (normalized / 100) * 0.08 : 1;
  document.documentElement.style.setProperty('--paper-opacity', opacity.toFixed(3));
  document.documentElement.style.setProperty('--paper-contrast', contrast.toFixed(3));
  if (paperTextureToggle) paperTextureToggle.checked = on;
  if (paperTextureLevel) paperTextureLevel.value = String(normalized);
  if (paperTextureLevelValue) paperTextureLevelValue.textContent = `${normalized}%`;
  if (paperTextureLevel) paperTextureLevel.disabled = !on;
}

function onPaperTextureToggle() {
  const enabled = !!paperTextureToggle?.checked;
  const level = parseInt(paperTextureLevel?.value || '0', 10) || 0;
  applyPaperTexture(enabled, level);
  localStorage.setItem(SAVED_PAPER_TEXTURE_ENABLED_KEY, enabled ? '1' : '0');
  localStorage.setItem(SAVED_PAPER_TEXTURE_LEVEL_KEY, String(level));
}

function onPaperTextureLevelInput() {
  const level = parseInt(paperTextureLevel?.value || '0', 10) || 0;
  applyPaperTexture(!!paperTextureToggle?.checked, level);
  localStorage.setItem(SAVED_PAPER_TEXTURE_LEVEL_KEY, String(level));
}

function applyPaperTextureGlobal(enabled, level) {
  const on = !!enabled;
  const normalized = Number.isFinite(level) ? Math.max(0, Math.min(100, level)) : 0;
  const opacity = on ? (normalized / 100) * 0.33 : 0;
  const contrast = on ? 1 + (normalized / 100) * 0.1 : 1;
  document.documentElement.style.setProperty('--paper-global-opacity', opacity.toFixed(3));
  document.documentElement.style.setProperty('--paper-global-contrast', contrast.toFixed(3));
  if (paperTextureGlobalToggle) paperTextureGlobalToggle.checked = on;
  if (paperTextureGlobalLevel) paperTextureGlobalLevel.value = String(normalized);
  if (paperTextureGlobalLevelValue) paperTextureGlobalLevelValue.textContent = `${normalized}%`;
  if (paperTextureGlobalLevel) paperTextureGlobalLevel.disabled = !on;
}

function onPaperTextureGlobalToggle() {
  const enabled = !!paperTextureGlobalToggle?.checked;

function isKeyValid(provider, value) {
  if (!value) return false;
  return provider === 'groq' ? value.startsWith('gsk_') && value.length > 20 : value.startsWith('sk-') && value.length > 20;
}

function setKeyStatus(el, valid) {
  if (el) el.textContent = valid ? '✅' : '⬜';
}

function syncProviderFields() {
  providerSelect.value = activeProvider;
  settingsProviderSelect.value = activeProvider;
  keyInput.value = getCurrentKey();
  keyInput.placeholder = getProviderConfig(activeProvider).placeholder;
  providerKeyLink.href = getProviderConfig(activeProvider).keyLink;
  if (brandSubtitle) brandSubtitle.textContent = `INGLÉS ↔ ESPAÑOL · ${getProviderConfig(activeProvider).label.toUpperCase()}`;
  setKeyStatus(keyStatus, isKeyValid(activeProvider, keyInput.value.trim()));
}

function updateStoredKeyStatuses() {
  setKeyStatus(groqKeyStatus, isKeyValid('groq', getStoredKey('groq')));
  setKeyStatus(deepseekKeyStatus, isKeyValid('deepseek', getStoredKey('deepseek')));
  setKeyStatus(keyStatus, isKeyValid(activeProvider, getCurrentKey()));
}

function humanizeModel(id) {
  return id.replace(/^(moonshotai|meta-llama|qwen|openai)\//, '').replace(/-/g, ' ').replace(/\b\w/g, (ch) => ch.toUpperCase());
}

async function populateModels(provider, forceReload = false) {
  const config = getProviderConfig(provider);
  if (modelSelect.dataset.provider === provider && modelSelect.options.length && !forceReload) return;
  let models = [...config.defaults];
  const key = getStoredKey(provider);
  if (isKeyValid(provider, key)) {
    try {
      const res = await fetch(config.modelsUrl, { headers: { Authorization: `Bearer ${key}` } });
      if (res.ok) {
        const payload = await res.json();
        const found = (payload.data || []).map((item) => item.id).filter(Boolean);
        if (found.length) models = found;
      }
    } catch {}
  }
  modelSelect.innerHTML = models.map((id) => `<option value="${id}">${humanizeModel(id)}${id === config.defaultModel ? ' ⭐' : ''}</option>`).join('');
  modelSelect.dataset.provider = provider;
  const saved = getSavedModel(provider);
  modelSelect.value = [...modelSelect.options].some((option) => option.value === saved) ? saved : config.defaultModel;
  setSavedModel(provider, modelSelect.value);
}

function onProviderKeyInput(provider) {
  const input = provider === 'groq' ? groqKeyInput : deepseekKeyInput;
  const value = input.value.trim();
  setStoredKey(provider, value);
  if (provider === activeProvider) keyInput.value = value;
  updateStoredKeyStatuses();
}

function onKeyInput() {
  const value = keyInput.value.trim();
  setStoredKey(activeProvider, value);
  if (activeProvider === 'groq') groqKeyInput.value = value;
  if (activeProvider === 'deepseek') deepseekKeyInput.value = value;
  updateStoredKeyStatuses();
  clearTimeout(loadModelsTimer);
  if (isKeyValid(activeProvider, value)) loadModelsTimer = setTimeout(() => populateModels(activeProvider, true), 500);
}

function onNotesInput() {
  localStorage.setItem(SAVED_NOTES_KEY, notesInput.value);
}

function switchProvider(provider) {
  activeProvider = provider in PROVIDERS ? provider : 'groq';
  localStorage.setItem(SAVED_PROVIDER_KEY, activeProvider);
  syncProviderFields();
  populateModels(activeProvider);
}

function randomWords() {
  const pool = WORDS_BY_LEVEL[selectedLevel]?.words || WORDS_BY_LEVEL.B1.words;
  return [...pool].sort(() => Math.random() - 0.5).slice(0, 8);
}

function renderWordCards(words) {
  return words.map((word) => `<button class="word-card" onclick="quickSend('${word}')">${word}</button>`).join('');
}

function refreshWords() {
  const grid = document.getElementById('word-grid');
  if (grid) grid.innerHTML = renderWordCards(randomWords());
}

function selectLevel(key) {
  selectedLevel = key;
  document.querySelectorAll('.level-tab').forEach((tab) => tab.classList.toggle('active', tab.dataset.level === key));
  refreshWords();
}

function quickSend(text) {
  if (!isKeyValid(activeProvider, getCurrentKey())) {
    toggleKeyPanel(true);
    keyInput.focus();
    return;
  }
  inputEl.value = text;
  sendMessage();
}

function showWelcome() {
  const welcome = document.createElement('div');
  welcome.className = 'welcome';
  welcome.innerHTML = `
    <span class="icon">⚡</span>
    <h2>Mi Traductor · ${getProviderConfig(activeProvider).label}</h2>
    <div class="steps">
      <b>📚 Palabras para practicar hoy</b>
      <div class="level-tabs">
        ${Object.entries(WORDS_BY_LEVEL).map(([key, level]) => `<button class="level-tab ${key === selectedLevel ? 'active' : ''}" data-level="${key}" onclick="selectLevel('${key}')" style="--lvl-color:${level.color}"><span class="level-emoji">${level.emoji}</span><span class="level-label">${level.label}</span><span class="level-name">${level.name}</span></button>`).join('')}
      </div>
      <div class="word-grid" id="word-grid">${renderWordCards(randomWords())}</div>
      <button onclick="refreshWords()" class="refresh-btn">🔄 Otras palabras</button>
    </div>`;
  chatDiv.appendChild(welcome);
}

function scrollBottom(force = false) {
  const dist = chatDiv.scrollHeight - chatDiv.scrollTop - chatDiv.clientHeight;
  if (force || dist < 80) chatDiv.scrollTop = chatDiv.scrollHeight;
}

function closeAllMessageActions() {
  chatDiv.querySelectorAll('.msg.actions-open').forEach((el) => el.classList.remove('actions-open'));
}

chatDiv.addEventListener('click', (e) => {
  const actionBtn = e.target.closest('.msg-action-btn');
  if (actionBtn) return;
  const msg = e.target.closest('.msg');
  if (!msg || msg.id === 'typing-row') return;
  const alreadyOpen = msg.classList.contains('actions-open');
  closeAllMessageActions();
  if (!alreadyOpen) msg.classList.add('actions-open');
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.msg')) closeAllMessageActions();
});

function setSendButtonState(loading) {
  sendBtn.disabled = false;
  sendBtn.textContent = loading ? '⏹' : '➤';
  sendBtn.title = loading ? 'Detener' : 'Enviar';
}

function clearEditingState() {
  pendingEditTurnId = null;
  document.querySelectorAll('.msg.editing').forEach((el) => el.classList.remove('editing'));
}

function buildConversationHistoryFromDOM() {
  const msgs = [...chatDiv.querySelectorAll('.msg[data-role]')].filter((el) => el.id !== 'typing-row').sort((a, b) => Number(a.dataset.turnId || 0) - Number(b.dataset.turnId || 0));
  conversationHistory = msgs.map((el) => ({ role: el.dataset.role === 'ai' ? 'assistant' : 'user', content: String(el.dataset.rawText || '') }));
}

function getNextTurnId() {
  turnCounter = Math.max(turnCounter + 1, Date.now());
  return String(turnCounter);
}

function getTurnElements(turnId) {
  return {
    userEl: chatDiv.querySelector(`.msg[data-role="user"][data-turn-id="${turnId}"]`),
    aiEl: chatDiv.querySelector(`.msg[data-role="ai"][data-turn-id="${turnId}"]`)
  };
}

function copyMessage(btn) {
  const msg = btn.closest('.msg');
  navigator.clipboard?.writeText(msg?.dataset?.rawText || '').catch(() => {});
}

function editMessage(btn) {
  const msg = btn.closest('.msg');
  const turnId = msg?.dataset?.turnId;
  if (!turnId) return;
  const { userEl, aiEl } = getTurnElements(turnId);
  const text = userEl?.dataset?.rawText || msg?.dataset?.rawText || '';
  if (!text) return;
  clearEditingState();
  pendingEditTurnId = turnId;
  userEl?.classList.add('editing');
  aiEl?.classList.add('editing');
  inputEl.value = text;
  inputEl.focus();
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}

function retryMessage(btn) {
  editMessage(btn);
  sendMessage();
}

function buildMessageActions() {
  return `<div class="msg-actions"><button class="msg-action-btn" onclick="retryMessage(this)">Reintentar</button><button class="msg-action-btn" onclick="copyMessage(this)">Copiar</button><button class="msg-action-btn" onclick="editMessage(this)">Editar</button></div>`;
}

function escapeHtml(text) {
  return String(text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;');
}

function addUserBubble(text, turnId = getNextTurnId()) {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg user';
  wrapper.dataset.role = 'user';
  wrapper.dataset.turnId = String(turnId);
  wrapper.dataset.rawText = text;
  wrapper.innerHTML = `<div class="avatar usr">👤</div><div class="msg-content"><div class="bubble user">${escapeHtml(text)}</div>${buildMessageActions()}</div>`;
  chatDiv.appendChild(wrapper);
  scrollBottom(true);
}

function addAIBubble(markdownText, turnId = getNextTurnId()) {
  const raw = String(markdownText || 'Sin respuesta.');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg';
  wrapper.dataset.role = 'ai';
  wrapper.dataset.turnId = String(turnId);
  wrapper.dataset.rawText = raw;
  wrapper.innerHTML = `<div class="avatar ai">🗣️</div><div class="msg-content"><div class="bubble ai">${marked.parse(raw)}</div>${buildMessageActions()}</div>`;
  chatDiv.appendChild(wrapper);
  scrollBottom();
}

function addTypingRow() {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg';
  wrapper.id = 'typing-row';
  wrapper.innerHTML = `<div class="avatar ai">🗣️</div><div class="msg-content"><div class="bubble ai"><div class="typing-wrap"><span></span><span></span><span></span></div></div></div>`;
  chatDiv.appendChild(wrapper);
  scrollBottom(true);
}

async function callProvider(messages, model, temperature, signal) {
  const key = getCurrentKey();
  if (!isKeyValid(activeProvider, key)) throw new Error(`Falta API key valida de ${getProviderConfig(activeProvider).label}.`);
  const res = await fetch(getProviderConfig(activeProvider).completionsUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
    body: JSON.stringify({ model, temperature, max_tokens: 1500, messages }),
    signal
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data?.error?.message || `Error HTTP ${res.status}`);
  return data?.choices?.[0]?.message?.content || '';
}

function stopGeneration() {
  if (!isLoading) return;
  activeRequestController?.abort();
}

async function sendMessage(forcedText = '') {
  const text = forcedText || inputEl.value.trim();
  if (isLoading) { stopGeneration(); return; }
  if (!text) return;
  if (!isKeyValid(activeProvider, getCurrentKey())) {
    toggleKeyPanel(true);
    keyInput.focus();
    return;
  }

  const editingTurnId = pendingEditTurnId;
  let userEl = null;
  let aiEl = null;
  if (editingTurnId) {
    ({ userEl, aiEl } = getTurnElements(editingTurnId));
    if (userEl) {
      userEl.dataset.rawText = text;
      const userBubble = userEl.querySelector('.bubble.user');
      if (userBubble) userBubble.innerHTML = escapeHtml(text);
    }
    if (aiEl) aiEl.remove();
  }

  isLoading = true;
  activeRequestController = new AbortController();
  setSendButtonState(true);
  inputEl.value = '';
  inputEl.style.height = 'auto';

  const turnId = editingTurnId || getNextTurnId();
  if (!editingTurnId) addUserBubble(text, turnId);
  addTypingRow();
  buildConversationHistoryFromDOM();

  const notes = notesInput.value.trim();
  const messages = [
    { role:'system', content: `${SYSTEM_PROMPT}${notes ? `\n\nNotas persistentes del usuario:\n${notes}` : ''}` },
    ...conversationHistory
  ];

  try {
    const finalText = await callProvider(messages, modelSelect.value, parseFloat(document.getElementById('tempSelect').value), activeRequestController.signal);
    document.getElementById('typing-row')?.remove();
    addAIBubble(finalText || 'Sin respuesta del modelo.', turnId);
    clearEditingState();
    buildConversationHistoryFromDOM();
  } catch (err) {
    document.getElementById('typing-row')?.remove();
    if (String(err?.name || '') === 'AbortError') {
      addAIBubble('⏹ Respuesta detenida por el usuario.', turnId);
      clearEditingState();
      buildConversationHistoryFromDOM();
    } else {
      const errorBubble = document.createElement('div');
      errorBubble.className = 'error-bubble';
      errorBubble.textContent = `❌ ${err?.message || String(err)}`;
      chatDiv.appendChild(errorBubble);
      scrollBottom();
    }
  } finally {
    isLoading = false;
    activeRequestController = null;
    setSendButtonState(false);
  }
}

function clearChat() {
  chatDiv.innerHTML = '';
  conversationHistory = [];
  clearEditingState();
  showWelcome();
}

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

providerSelect.addEventListener('change', () => switchProvider(providerSelect.value));
settingsProviderSelect.addEventListener('change', () => switchProvider(settingsProviderSelect.value));
modelSelect.addEventListener('change', () => setSavedModel(activeProvider, modelSelect.value));

groqKeyInput.value = getStoredKey('groq');
deepseekKeyInput.value = getStoredKey('deepseek');
notesInput.value = localStorage.getItem(SAVED_NOTES_KEY) || '';

const savedTheme = localStorage.getItem(SAVED_THEME_KEY) || DEFAULT_THEME;
const savedThemeMode = localStorage.getItem(SAVED_THEME_MODE_KEY) || DEFAULT_THEME_MODE;
const savedPaperEnabled = localStorage.getItem(SAVED_PAPER_TEXTURE_ENABLED_KEY) === '1';
const savedPaperLevel = parseInt(localStorage.getItem(SAVED_PAPER_TEXTURE_LEVEL_KEY) || '0', 10) || 0;
const savedPaperGlobalEnabled = localStorage.getItem(SAVED_PAPER_TEXTURE_GLOBAL_ENABLED_KEY) === '1';
const savedPaperGlobalLevel = parseInt(localStorage.getItem(SAVED_PAPER_TEXTURE_GLOBAL_LEVEL_KEY) || '0', 10) || 0;

applyTheme(savedTheme, savedThemeMode);
applyPaperTexture(savedPaperEnabled, savedPaperLevel);
applyPaperTextureGlobal(savedPaperGlobalEnabled, savedPaperGlobalLevel);
syncProviderFields();
updateStoredKeyStatuses();
populateModels(activeProvider);
showWelcome();
setSendButtonState(false);
inputEl.focus();
</script>
</body>
</html>
